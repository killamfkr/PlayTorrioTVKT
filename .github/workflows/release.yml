name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Decode release keystore
        run: |
          if [ -n "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > release.jks
          else
            keytool -genkey -v \
              -keystore release.jks \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -alias playtorrio \
              -storepass playtorrio123 \
              -keypass playtorrio123 \
              -dname "CN=PlayTorrio TV, OU=Mobile, O=PlayTorrio, L=NA, ST=NA, C=US"
          fi

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build release APKs
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
