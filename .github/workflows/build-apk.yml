# Builds debug APKs on every branch so you can download installers after each push or PR update.
# Draft PRs trigger pull_request the same as ready PRs — CI builds automatically when you push.
name: Build APK

on:
  # All branches (feature branches, integration branches, etc.)
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug:
    name: assembleDebug
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Gradle assembleDebug
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleDebug

      # Slash-safe label for artifact names (refs like refs/heads/foo/bar → foo-bar)
      - name: Artifact label
        id: label
        run: |
          REF="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          SAFE="$(echo "$REF" | tr '/' '-')"
          echo "slug=${SAFE:-branch}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: playtorrio-debug-${{ steps.label.outputs.slug }}-${{ github.sha }}
          path: |
            app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
